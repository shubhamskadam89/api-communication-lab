server:
  port: 8082

spring:
  application:
    name: repository-service
  datasource:
    url: jdbc:postgresql://localhost:5432/repository_db
    username: postgres
    password: password
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

grpc:
  server:
    port: 9092

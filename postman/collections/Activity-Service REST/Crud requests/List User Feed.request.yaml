$kind: http-request
name: List User Feed
url: "http://localhost:8083/api/v1/users/{{created_activity_author_uuid}}/activities?page=0&size=10"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("Response list is not empty", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData.data.content).to.be.an('array').that.is.not.empty;
      });
order: 4000

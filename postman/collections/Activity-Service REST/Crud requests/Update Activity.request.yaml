$kind: http-request
name: Update Activity
url: "http://localhost:8083/api/v1/activities/{{created_activity_uuid}}"
method: PUT
headers:
  Content-Type: application/json
body:
  type: json
  content: |+
    {
      "content": "{{temp_updated_activity_content}}",
      "visibility": "PUBLIC",
      "mediaUrls": ["{{temp_updated_activity_mediaUrl}}"]
    }
scripts:
  - type: beforeRequest
    code: |-
      pm.globals.set("temp_updated_activity_content", pm.variables.replaceIn("{{$randomLoremSentence}}"));
      pm.globals.set("temp_updated_activity_mediaUrl", pm.variables.replaceIn("{{$randomUrl}}"));
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("Response content was updated", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData.data.content).to.eql(pm.globals.get("temp_updated_activity_content"));
      });
order: 5000

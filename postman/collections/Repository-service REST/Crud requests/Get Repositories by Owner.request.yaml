$kind: http-request
name: Get Repositories by Owner
url: "http://localhost:8082/api/users/{{created_repo_owner_uuid}}/repositories"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("Response list is not empty", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData.data).to.be.an('array').that.is.not.empty;
      });
order: 3000

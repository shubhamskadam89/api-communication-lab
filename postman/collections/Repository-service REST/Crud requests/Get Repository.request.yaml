$kind: http-request
name: Get Repository
url: "http://localhost:8082/api/repositories/{{created_repo_uuid}}"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("Response matches created repo UUID", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData.data.uuid).to.eql(pm.globals.get("created_repo_uuid"));
      });
order: 2000

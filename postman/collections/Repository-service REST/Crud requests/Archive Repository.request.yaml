$kind: http-request
name: Archive Repository
url: "http://localhost:8082/api/repositories/{{created_repo_uuid}}/archive"
method: PUT
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("Repository is archived", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData.data.archived).to.be.true;
      });
order: 5000

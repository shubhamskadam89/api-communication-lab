$kind: http-request
name: Get User
url: "http://localhost:8081/api/v1/users/{{created_user_uuid}}"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("Response matches created user UUID", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData.data.uuid).to.eql(pm.globals.get("created_user_uuid"));
      });
order: 2000

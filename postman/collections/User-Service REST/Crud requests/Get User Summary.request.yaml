$kind: http-request
name: Get User Summary
url: "http://localhost:8081/api/v1/users/{{created_user_uuid}}/summary"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("Summary data matches created values", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData.data.username).to.eql(pm.globals.get("temp_username"));
          pm.expect(jsonData.data.displayName).to.eql(pm.globals.get("temp_displayName"));
      });
order: 3000

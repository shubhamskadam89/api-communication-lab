$kind: http-request
name: Create User
url: "http://localhost:8081/api/v1/users"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |+
    {
      "username": "{{temp_username}}",
      "email": "{{temp_email}}",
      "displayName": "{{temp_displayName}}",
      "bio": "{{temp_bio}}",
      "avatarUrl": "{{temp_avatarUrl}}"
    }
scripts:
  - type: beforeRequest
    code: |-
      pm.globals.set("temp_username", pm.variables.replaceIn("{{$randomUserName}}"));
      pm.globals.set("temp_email", pm.variables.replaceIn("{{$randomEmail}}"));
      pm.globals.set("temp_displayName", pm.variables.replaceIn("{{$randomFullName}}"));
      pm.globals.set("temp_bio", pm.variables.replaceIn("{{$randomLoremSentence}}"));
      pm.globals.set("temp_avatarUrl", pm.variables.replaceIn("{{$randomAvatarImage}}"));
  - type: afterResponse
    code: |-
      pm.test("Status code is 201", function () {
          pm.response.to.have.status(201);
      });
      pm.test("Response contains user UUID", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData.data.uuid).to.be.a('string');
          pm.globals.set("created_user_uuid", jsonData.data.uuid);
      });
order: 1000

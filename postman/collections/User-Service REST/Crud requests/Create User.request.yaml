$kind: http-request
name: Create User
url: "http://localhost:8081/api/v1/users"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |+
    {
      "username": "{{temp_username}}",
      "email": "{{temp_email}}",
      "displayName": "User {{$randomInt}}",
      "bio": "Developer profile",
      "avatarUrl": "https://example.com/avatar.png"
    }
scripts:
  - type: beforeRequest
    code: |-
      var randomInt = pm.variables.replaceIn("{{$randomInt}}");
      pm.globals.set("temp_username", "user_" + randomInt);
      pm.globals.set("temp_email", "user_" + randomInt + "@example.com");
  - type: afterResponse
    code: |-
      pm.test("Status code is 201", function () {
          pm.response.to.have.status(201);
      });
      pm.test("Response contains user UUID", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData.data.uuid).to.be.a('string');
          pm.globals.set("created_user_uuid", jsonData.data.uuid);
      });
order: 1000

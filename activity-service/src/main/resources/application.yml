server:
  port: 8083

spring:
  application:
    name: activity-service
  datasource:
    url: jdbc:postgresql://localhost:5432/activity_db
    username: postgres
    password: password
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

grpc:
  server:
    port: 9093
